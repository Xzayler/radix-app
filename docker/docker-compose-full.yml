services:
  postgres:
    image: postgres
    container_name: radix-postgres
    ports:
      - '${POSTGRES_PORT}:${POSTGRES_PORT}'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - minio-net

  migrate:
    build:
      context: ..
      dockerfile: docker/DockerfileWeb
    command: ['pnpm', 'migrate']
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB_NAME}
    restart: 'no'
    networks:
      - minio-net

  minio:
    image: quay.io/minio/minio
    container_name: radix-minio
    ports:
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - minio-net

  minio-bucket-setup:
    build:
      context: ..
      dockerfile: docker/DockerfileWeb
    command: ['pnpm', 'minio-setup']
    depends_on:
      - minio
    environment:
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_BUCKET: ${MINIO_BUCKET}
    restart: no
    networks:
      - minio-net

  nginx:
    image: nginx:alpine
    ports:
      - '${MINIO_PORT}:${MINIO_PORT}'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - minio
    networks:
      - minio-net

  web:
    build:
      context: ..
      dockerfile: docker/DockerfileWeb
    command: ['pnpm', 'start']
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-bucket-setup:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB_NAME}
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_BUCKET: ${MINIO_BUCKET}
      USER_SESSION_PASSWORD: ${USER_SESSION_PASSWORD}
    ports:
      - '3000:3000'
    restart: unless-stopped
    networks:
      - minio-net

  worker:
    build:
      context: ..
      dockerfile: docker/DockerfileWorker
    mem_limit: ${WORKER_MEMORY_GB}g
    memswap_limit: ${WORKER_MEMORY_GB}g
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-bucket-setup:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB_NAME}
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_BUCKET: ${MINIO_BUCKET}
      POLLING_RATE: ${POLLING_RATE_SECONDS}
    restart: on-failure
    networks:
      - minio-net

volumes:
  minio_data:
  postgres_data:

networks:
  default:
    name: radix
  minio-net:
    driver: bridge
